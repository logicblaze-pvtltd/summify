<html lang="en" class="light">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalAI PDF - Secure Summarization</title>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.remove('light');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!-- Tailwind CSS with Forms and Container Queries plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts and Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <style>
      :root {
        --primary: #007A5E;
        --on-primary: #ffffff;
        --primary-container: #3DBB96;
        --on-primary-container: #002A1F;
        --secondary: #007A5E;
        --on-secondary: #ffffff;

        --tertiary: #555E70;

        --tertiary-container: #A2AABE;
        --on-tertiary-container: #1E2433;
        --error: #BA1A1A;
        --on-error: #ffffff;
        --error-container: #FFDAD6;
        --on-error-container: #93000A;
        --surface: #F5F7FA;
        --on-surface: #1A1D21;
        --surface-variant: #E0E3E8;
        --on-surface-variant: #4A5058;
        --outline: #8A9199;
        --outline-variant: #C5C9D0;
        --background: #F3F5F9;
        --on-background: #1A1D21;
        --inverse-surface: #2E3134;
        --inverse-on-surface: #F0F1F5;
        --inverse-primary: #73D9B7;
        --surface-tint: #007A5E;
        --surface-dim: #D1D5DB;
        --surface-bright: #FFFFFF;
        --surface-container: #EFF1F5;
        --surface-container-low: #FAFBFC;
        --surface-container-high: #E5E8ED;
        --surface-container-highest: #DEE1E7;
        --surface-container-lowest: #FFFFFF;
        --primary-fixed: #90F6D2;
        --primary-fixed-dim: #73D9B7;
        --on-primary-fixed: #002117;
        --on-primary-fixed-variant: #00513E;
        --secondary-fixed: #9BF4D1;
        --secondary-fixed-dim: #7FD7B6;
        --on-secondary-fixed: #002116;
        --on-secondary-fixed-variant: #00513C;
        --tertiary-fixed: #DCE2F9;
        --tertiary-fixed-dim: #BFC6DC;
        --on-tertiary-fixed: #141B2B;
        --on-tertiary-fixed-variant: #404759;
        --brand-green: #3DBB96;
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(255, 255, 255, 0.6);

        --shadow-pro: rgba(0, 0, 0, 0.06);
        --shadow-pro-hover: rgba(0, 0, 0, 0.10);
        --scrollbar-thumb: #C5C9D0;
        --scrollbar-thumb-hover: #8A9199;
        --drag-active-bg: rgba(61, 187, 150, 0.10);
        --card-hover-lift: rgba(0, 0, 0, 0.08);
        --white: #FFFFFF;
        --black: #000000;
      }

      .dark {
        --primary: #73d9b7;
        --on-primary: #003828;
        --primary-container: #00513c;
        --on-primary-container: #90f6d2;
        --secondary: #b1ccbf;
        --on-secondary: #1d352b;
        --secondary-container: #2d4c3f;
        --on-secondary-container: #7fd7b6;
        --tertiary: #bfc6dc;
        --on-tertiary: #293042;
        --tertiary-container: #3f4759;
        --on-tertiary-container: #dce2f9;
        --error: #ffb4ab;
        --on-error: #690005;
        --error-container: #93000a;
        --on-error-container: #ffdad6;
        --surface: #0f1412;
        --on-surface: #e0e3e1;
        --surface-variant: #3e4944;
        --on-surface-variant: #bfc9c3;
        --outline: #89938e;
        --outline-variant: #3e4944;
        --background: #030712;
        --on-background: #e0e3e1;
        --inverse-surface: #e0e3e1;
        --inverse-on-surface: #2e3134;
        --inverse-primary: #006c53;
        --surface-tint: #73d9b7;
        --surface-dim: #0f1412;
        --surface-bright: #353a37;
        --surface-container: #111f1a;
        --surface-container-low: #0b1a15;
        --surface-container-high: #1D293D;
        --surface-container-highest: #0F172B;
        --surface-container-lowest: #000000;
        --primary-fixed: #90f6d2;
        --primary-fixed-dim: #73d9b7;
        --on-primary-fixed: #002117;
        --on-primary-fixed-variant: #00513e;
        --secondary-fixed: #9bf4d1;
        --secondary-fixed-dim: #7fd7b6;
        --on-secondary-fixed: #002116;
        --on-secondary-fixed-variant: #00513c;
        --tertiary-fixed: #dce2f9;
        --tertiary-fixed-dim: #bfc6dc;
        --on-tertiary-fixed: #141b2b;

        --brand-green: #5ECBA8;
        --glass-bg: rgba(18, 25, 41, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-shadow: rgba(0, 0, 0, 0.3);
        --shadow-pro: rgba(0, 0, 0, 0.2);
        --shadow-pro-hover: rgba(0, 0, 0, 0.35);
        --scrollbar-thumb: #3e4944;
        --scrollbar-thumb-hover: #6e7a74;
        --drag-active-bg: rgba(61, 187, 150, 0.15);
        --card-hover-lift: rgba(0, 0, 0, 0.3);
        --white: #1a2234;
        --black: #ffffff;
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .fill-icon {
        font-variation-settings: 'FILL' 1;
      }
      /* Glassmorphism Effect */
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 var(--glass-shadow);
      }
      .drag-active {
        border-color: var(--brand-green) !important;
        background: var(--drag-active-bg) !important;
      }
      /* Refined Shadows */
      .shadow-pro {
        box-shadow: 0 10px 40px -10px var(--shadow-pro);
      }
      .shadow-pro-hover:hover {
        box-shadow: 0 20px 50px -12px var(--shadow-pro-hover);
      }
      /* Custom Scrollbars */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .card-hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px -5px var(--card-hover-lift), 0 8px 10px -6px var(--card-hover-lift);
      }
      /* Local Jameel Noori Nastaleeq Font for Urdu Text */
      @font-face {
        font-family: 'Jameel Noori Nastaleeq';
        font-style: normal;
        font-weight: 400;
        src: local('Jameel Noori Nastaleeq'), url('/fonts/JameelNooriNastaleeqRegular.woff') format('woff');
        font-display: swap;
      }
      .urdu-calligraphy {
        font-family: 'Jameel Noori Nastaleeq', 'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;
        font-size: 1.35em;
        line-height: 2.2;
        direction: rtl;
        text-align: right;
      }
      /* Glass gradient panel — works in both light & dark modes */
      .glass-gradient-panel {
        background: linear-gradient(180deg, var(--glass-bg) 0%, color-mix(in srgb, var(--surface-container) 60%, transparent) 100%) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body class="bg-background text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
